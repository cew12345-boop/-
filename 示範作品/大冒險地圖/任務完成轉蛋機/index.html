<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任務完成轉蛋機</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #3a2415;
      --paper: #fff8e7;
      --gold: #f7b84b;
      --orange: #ed8134;
      --green: #2ea56f;
      --red: #e75d4f;
      --line: rgba(91, 49, 22, 0.16);
      --shadow: rgba(60, 35, 18, 0.24);
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 221, 132, 0.5), transparent 18rem),
        radial-gradient(circle at 84% 8%, rgba(255, 157, 83, 0.28), transparent 17rem),
        linear-gradient(135deg, #fff4cf 0%, #ffd8a6 48%, #ffb36e 100%);
      overflow-x: hidden;
    }
    button { color: inherit; font: inherit; }
    .app {
      width: min(1180px, calc(100% - 24px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 18px 0 24px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4.8vw, 3.6rem);
      line-height: 1.02;
      letter-spacing: 0;
      color: #6d3518;
      text-shadow: 0 3px 0 rgba(255,255,255,0.62), 0 12px 28px rgba(112, 55, 20, 0.18);
    }
    .status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: end;
    }
    .pill {
      min-height: 40px;
      display: grid;
      place-items: center;
      padding: 9px 12px;
      border-radius: 999px;
      color: #fffaf0;
      background: rgba(93, 50, 22, 0.78);
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(95, 51, 22, 0.18);
    }
    .stage {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) minmax(300px, 420px);
      gap: 18px;
      align-items: stretch;
    }
    .machine-panel,
    .result-panel {
      border: 1px solid rgba(255,255,255,0.48);
      border-radius: 8px;
      background: rgba(255, 250, 236, 0.78);
      box-shadow: 0 24px 70px rgba(112, 55, 20, 0.18);
      overflow: hidden;
    }
    .machine-panel {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 660px;
      padding: 20px;
    }
    .capsule-strip {
      position: absolute;
      left: 50%;
      top: 22px;
      width: min(520px, 82%);
      transform: translateX(-50%);
      opacity: 0.9;
      filter: drop-shadow(0 10px 18px rgba(96, 47, 18, 0.18));
      pointer-events: none;
    }
    .machine-wrap {
      position: relative;
      width: min(540px, 100%);
      display: grid;
      place-items: center;
    }
    .machine {
      width: min(520px, 100%);
      display: block;
      filter: drop-shadow(0 28px 34px rgba(84, 42, 16, 0.28));
      transform-origin: 50% 68%;
    }
    .machine.shake {
      animation: machineShake 0.72s ease;
    }
    .flying-capsule {
      position: absolute;
      left: 50%;
      bottom: 22%;
      width: 86px;
      aspect-ratio: 1;
      background-image: url("images/capsules.png");
      background-size: 600% 100%;
      background-position: 0 50%;
      border-radius: 999px;
      opacity: 0;
      filter: drop-shadow(0 12px 18px rgba(70, 35, 13, 0.28));
      pointer-events: none;
    }
    .flying-capsule.roll {
      animation: capsuleRoll 1.1s ease forwards;
    }
    .spin-btn {
      position: absolute;
      left: 50%;
      bottom: 7%;
      transform: translateX(-50%);
      min-width: 184px;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      color: #fffaf0;
      background: linear-gradient(135deg, #ff8d43, #d8572a);
      box-shadow: 0 13px 0 #9c3c20, 0 22px 34px rgba(126, 55, 21, 0.28);
      cursor: pointer;
      font-weight: 950;
      font-size: 1.18rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .spin-btn:hover:not(:disabled),
    .spin-btn:focus-visible {
      transform: translateX(-50%) translateY(-2px);
      outline: none;
    }
    .spin-btn:active:not(:disabled) {
      transform: translateX(-50%) translateY(8px);
      box-shadow: 0 5px 0 #9c3c20, 0 12px 20px rgba(126, 55, 21, 0.24);
    }
    .spin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .result-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 660px;
      padding: 18px;
    }
    .result-panel h2 {
      margin: 0 0 6px;
      color: #6d3518;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: 0;
    }
    .result-copy {
      margin: 0;
      color: rgba(58, 36, 21, 0.72);
      font-weight: 850;
      line-height: 1.55;
    }
    .reward-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 360px;
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.9), rgba(255, 233, 181, 0.54) 46%, rgba(255,255,255,0.24) 70%),
        rgba(255, 251, 240, 0.6);
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      width: min(420px, 112%);
      opacity: 0;
      transform: scale(0.72) rotate(-8deg);
      pointer-events: none;
      mix-blend-mode: multiply;
    }
    .sparkle.show {
      animation: sparklePop 1.2s ease forwards;
    }
    .prize {
      width: min(300px, 84%);
      display: block;
      opacity: 0;
      transform: translateY(18px) scale(0.72);
      filter: drop-shadow(0 22px 26px rgba(82, 42, 18, 0.18));
    }
    .prize.show {
      animation: prizePop 0.72s cubic-bezier(.2, 1.2, .32, 1) forwards;
    }
    .rarity {
      display: inline-grid;
      place-items: center;
      min-width: 78px;
      min-height: 42px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #fff;
      background: #999;
      font-weight: 950;
      box-shadow: 0 10px 20px rgba(0,0,0,0.16);
    }
    .rarity.n { background: #9d9182; }
    .rarity.r { background: #2ea56f; }
    .rarity.sr { background: #3d8edb; }
    .rarity.ssr { background: #8a4bd6; }
    .rarity.ur { background: linear-gradient(135deg, #ffda67, #d68b21); }
    .message {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #4f2a16;
      background: #fff7db;
      font-weight: 900;
      line-height: 1.6;
    }
    .history {
      display: grid;
      gap: 8px;
      max-height: 180px;
      overflow: auto;
      padding-right: 4px;
    }
    .history-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.58);
      font-weight: 850;
    }
    .mini-prize {
      width: 46px;
      height: 36px;
      object-fit: contain;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .ghost-btn {
      min-height: 42px;
      padding: 9px 12px;
      border: 1px solid rgba(104, 57, 25, 0.22);
      border-radius: 8px;
      color: #5c321a;
      background: rgba(255,255,255,0.62);
      cursor: pointer;
      font-weight: 950;
    }
    @keyframes machineShake {
      0%, 100% { transform: rotate(0deg); }
      18% { transform: rotate(-2.5deg); }
      36% { transform: rotate(2.5deg); }
      54% { transform: rotate(-1.6deg); }
      72% { transform: rotate(1.2deg); }
    }
    @keyframes capsuleRoll {
      0% { opacity: 0; transform: translate(-50%, 0) rotate(0deg) scale(0.35); }
      20% { opacity: 1; }
      72% { opacity: 1; transform: translate(-10%, 110px) rotate(520deg) scale(1); }
      100% { opacity: 0; transform: translate(80%, 150px) rotate(720deg) scale(0.92); }
    }
    @keyframes prizePop {
      0% { opacity: 0; transform: translateY(18px) scale(0.72); }
      70% { opacity: 1; transform: translateY(-6px) scale(1.08); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes sparklePop {
      0% { opacity: 0; transform: scale(0.58) rotate(-12deg); }
      35% { opacity: 1; }
      100% { opacity: 0.95; transform: scale(1.08) rotate(0deg); }
    }
    @media (max-width: 860px) {
      .stage { grid-template-columns: 1fr; }
      .machine-panel, .result-panel { min-height: auto; }
      .machine-panel { padding: 18px 14px 94px; }
      .capsule-strip { top: 12px; width: 76%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>任務完成轉蛋機</h1>
        <p class="result-copy">完成任務後轉一下，看看今天抽到哪一種獎勵。</p>
      </div>
      <div class="status">
        <span class="pill" id="ticketText">任務券 5</span>
        <span class="pill" id="countText">已抽 0 次</span>
      </div>
    </header>

    <section class="stage">
      <section class="machine-panel" aria-label="轉蛋機">
        <img class="capsule-strip" src="images/capsules.png" alt="彩色扭蛋">
        <div class="machine-wrap">
          <img class="machine" id="machine" src="images/machine.png" alt="復古橘色轉蛋機">
          <div class="flying-capsule" id="flyingCapsule" aria-hidden="true"></div>
          <button class="spin-btn" id="spinBtn" type="button">轉一下！</button>
        </div>
      </section>

      <section class="result-panel" aria-label="抽獎結果">
        <div>
          <h2>今日獎勵</h2>
          <p class="result-copy">N、R、SR、SSR、UR 五種稀有度。SSR / UR 會觸發金色慶祝特效。</p>
        </div>
        <div class="reward-stage">
          <img class="sparkle" id="sparkle" src="images/sparkle.png" alt="">
          <img class="prize" id="prize" src="images/prize-n.png" alt="獎品禮物盒">
          <span class="rarity n" id="rarity">N</span>
        </div>
        <div>
          <div class="message" id="message">把任務交給老師確認後，就可以按下轉蛋機。祝你抽到閃亮獎勵！</div>
          <div class="actions">
            <button class="ghost-btn" id="addTicketBtn" type="button">增加 1 張任務券</button>
            <button class="ghost-btn" id="resetBtn" type="button">重置紀錄</button>
          </div>
          <h2>抽獎紀錄</h2>
          <div class="history" id="history"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const rewards = [
      { id: "n", label: "N", name: "普通獎勵", img: "images/prize-n.png", weight: 45, text: "穩穩完成任務，得到普通獎勵。今天的努力已經存進學習背包。" },
      { id: "r", label: "R", name: "不錯獎勵", img: "images/prize-r.png", weight: 28, text: "手感不錯！綠色禮物盒亮起，任務能量正在上升。" },
      { id: "sr", label: "SR", name: "稀有獎勵", img: "images/prize-sr.png", weight: 17, text: "稀有獎勵出現！藍色寶石閃了一下，今天的專注力很漂亮。" },
      { id: "ssr", label: "SSR", name: "史詩獎勵", img: "images/prize-ssr.png", weight: 8, text: "SSR！金色彩帶炸開，星星在空中轉圈。這次任務完成得很有氣勢。" },
      { id: "ur", label: "UR", name: "傳說獎勵", img: "images/prize-ur.png", weight: 2, text: "UR 傳說降臨！王冠與桂冠一起發光，今天的任務表現值得被記住。" }
    ];

    const els = {
      machine: document.getElementById("machine"),
      capsule: document.getElementById("flyingCapsule"),
      spinBtn: document.getElementById("spinBtn"),
      prize: document.getElementById("prize"),
      sparkle: document.getElementById("sparkle"),
      rarity: document.getElementById("rarity"),
      message: document.getElementById("message"),
      history: document.getElementById("history"),
      ticketText: document.getElementById("ticketText"),
      countText: document.getElementById("countText"),
      addTicketBtn: document.getElementById("addTicketBtn"),
      resetBtn: document.getElementById("resetBtn")
    };

    let tickets = Number(localStorage.getItem("gacha_tickets") || 5);
    let history = JSON.parse(localStorage.getItem("gacha_history") || "[]");
    let spinning = false;

    function weightedPick() {
      const total = rewards.reduce((sum, reward) => sum + reward.weight, 0);
      let roll = Math.random() * total;
      for (const reward of rewards) {
        roll -= reward.weight;
        if (roll <= 0) return reward;
      }
      return rewards[0];
    }

    function capsuleFrame() {
      return Math.floor(Math.random() * 6) * 20;
    }

    function render() {
      els.ticketText.textContent = `任務券 ${tickets}`;
      els.countText.textContent = `已抽 ${history.length} 次`;
      els.spinBtn.disabled = spinning || tickets <= 0;
      els.history.innerHTML = history.length
        ? history.slice().reverse().map(item => `
          <div class="history-item">
            <img class="mini-prize" src="${item.img}" alt="">
            <span>${item.label}｜${item.name}</span>
          </div>
        `).join("")
        : `<div class="history-item"><span></span><span>還沒有紀錄，轉一下開始吧。</span></div>`;
      localStorage.setItem("gacha_tickets", String(tickets));
      localStorage.setItem("gacha_history", JSON.stringify(history));
    }

    function reveal(reward) {
      els.prize.classList.remove("show");
      els.sparkle.classList.remove("show");
      void els.prize.offsetWidth;
      els.prize.src = reward.img;
      els.prize.alt = `${reward.label} ${reward.name}`;
      els.rarity.className = `rarity ${reward.id}`;
      els.rarity.textContent = reward.label;
      els.message.textContent = reward.text;
      els.prize.classList.add("show");
      if (reward.id === "ssr" || reward.id === "ur") {
        void els.sparkle.offsetWidth;
        els.sparkle.classList.add("show");
      }
    }

    function spin() {
      if (spinning || tickets <= 0) return;
      spinning = true;
      tickets -= 1;
      const reward = weightedPick();
      els.message.textContent = "喀啦喀啦，轉蛋機正在旋轉，彩色膠囊準備掉出來...";
      els.machine.classList.remove("shake");
      els.capsule.classList.remove("roll");
      els.capsule.style.backgroundPosition = `${capsuleFrame()}% 50%`;
      void els.machine.offsetWidth;
      els.machine.classList.add("shake");
      els.capsule.classList.add("roll");
      render();
      setTimeout(() => {
        history.push({ label: reward.label, name: reward.name, img: reward.img });
        reveal(reward);
        spinning = false;
        render();
      }, 1050);
    }

    els.spinBtn.addEventListener("click", spin);
    els.addTicketBtn.addEventListener("click", () => {
      tickets += 1;
      render();
    });
    els.resetBtn.addEventListener("click", () => {
      tickets = 5;
      history = [];
      els.message.textContent = "紀錄已重置。新的任務券已放入轉蛋機。";
      els.prize.classList.remove("show");
      els.sparkle.classList.remove("show");
      render();
    });

    render();
  </script>
</body>
</html>
