<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大冒險地圖</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --paper: #fff8e6;
      --green: #22a06b;
      --red: #df4d52;
      --cyan: #2ed3e6;
      --gold: #f4b642;
      --shadow: rgba(6, 12, 24, 0.32);
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(46, 211, 230, 0.26), transparent 18rem),
        radial-gradient(circle at 84% 10%, rgba(244, 182, 66, 0.22), transparent 18rem),
        #0b1726;
      overflow: hidden;
    }
    button { color: inherit; font: inherit; }
    .cover {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      background: #050914;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .cover.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cover-hint {
      position: absolute;
      left: 50%;
      bottom: clamp(22px, 6vh, 62px);
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      color: #fff;
      background: rgba(0, 0, 0, 0.52);
      font-weight: 950;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }
    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 10px;
    }
    .map-container {
      position: relative;
      width: min(100%, calc((100vh - 20px) * 1672 / 941));
      max-width: 1672px;
      max-height: calc(100vh - 20px);
      aspect-ratio: 1672 / 941;
      filter: drop-shadow(0 26px 60px rgba(0, 0, 0, 0.38));
    }
    .map-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .info-panel {
      position: fixed;
      z-index: 20;
      right: 16px;
      top: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: end;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(7, 14, 26, 0.68);
      box-shadow: 0 14px 36px rgba(0,0,0,0.26);
      backdrop-filter: blur(6px);
    }
    .held {
      min-height: 38px;
      display: inline-grid;
      place-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      color: #fff8e6;
      background: rgba(255,255,255,0.1);
      font-weight: 950;
    }
    .clear-btn, .modal-btn {
      min-height: 38px;
      padding: 8px 12px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 950;
    }
    .clear-btn {
      color: #fff;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .hotspot {
      position: absolute;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0);
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .hotspot:hover,
    .hotspot:focus-visible {
      background: rgba(255, 246, 166, 0.14);
      box-shadow: 0 0 28px rgba(255, 230, 116, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.24);
      transform: scale(1.02);
      outline: none;
    }
    .hotspot.level-1 { left: 10.4%; top: 34.9%; width: 23.8%; height: 9.5%; }
    .hotspot.level-2 { left: 10.4%; top: 85.5%; width: 24.0%; height: 9.5%; }
    .hotspot.level-3 { left: 67.6%; top: 34.9%; width: 24.0%; height: 9.5%; }
    .hotspot.level-4 { left: 67.5%; top: 85.6%; width: 24.2%; height: 9.5%; }
    .hotspot.gate { left: 40.2%; top: 61.4%; width: 19.8%; height: 11.6%; }
    .stamp {
      position: absolute;
      width: clamp(24px, 3.2vw, 54px);
      height: clamp(24px, 3.2vw, 54px);
      display: none;
      place-items: center;
      border-radius: 999px;
      color: #062417;
      background: #77f2a3;
      border: 3px solid #fff8e6;
      box-shadow: 0 10px 22px rgba(0,0,0,0.26), 0 0 24px rgba(119, 242, 163, 0.8);
      font-size: clamp(1.05rem, 2vw, 2rem);
      font-weight: 950;
      pointer-events: none;
    }
    .stamp.show { display: grid; }
    .stamp.level-1 { left: 31.5%; top: 34.0%; }
    .stamp.level-2 { left: 31.7%; top: 84.8%; }
    .stamp.level-3 { left: 88.9%; top: 34.0%; }
    .stamp.level-4 { left: 89.0%; top: 84.9%; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(4, 7, 14, 0.78);
    }
    .modal.show { display: grid; }
    .cutscene {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      background: #050505;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .cutscene.show {
      display: grid;
      opacity: 1;
    }
    .cutscene.fade {
      opacity: 0;
      pointer-events: none;
    }
    .cutscene img,
    .cutscene video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: grayscale(1) contrast(1.06);
      transform: scale(1.02);
      animation: inkPan 14s ease-in-out forwards;
    }
    .cutscene video {
      display: none;
    }
    .cutscene.use-video img {
      display: none;
    }
    .cutscene.use-video video {
      display: block;
    }
    .cutscene.show img,
    .cutscene.show video {
      animation: inkPan 14s ease-in-out forwards;
    }
    .cutscene::before {
      content: "";
      position: absolute;
      inset: -10%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.34;
      background:
        radial-gradient(circle at 16% 72%, rgba(255,255,255,0.18), transparent 10%),
        radial-gradient(circle at 72% 18%, rgba(255,255,255,0.12), transparent 12%),
        radial-gradient(circle at 50% 48%, rgba(0,0,0,0.28), transparent 18%),
        repeating-linear-gradient(115deg, transparent 0 28px, rgba(255,255,255,0.035) 28px 30px);
      mix-blend-mode: screen;
      animation: inkMist 18s linear infinite;
    }
    .cutscene::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.18), transparent 24%, rgba(0,0,0,0.72)),
        radial-gradient(circle at 50% 42%, transparent 0 42%, rgba(0,0,0,0.44) 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 5px);
      pointer-events: none;
    }
    .cutscene-copy {
      position: relative;
      z-index: 3;
      align-self: end;
      width: min(760px, calc(100% - 34px));
      margin: 0 0 clamp(34px, 8vh, 84px);
      padding: clamp(16px, 3vw, 24px);
      color: rgba(255,255,255,0.92);
      text-align: center;
      text-shadow: 0 3px 16px rgba(0,0,0,0.86);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.18));
      opacity: 0;
      transform: translateY(14px);
      animation: textRise 1.8s ease 0.45s forwards;
    }
    .cutscene-kicker {
      margin: 0 0 8px;
      color: rgba(255,255,255,0.66);
      font-weight: 700;
      letter-spacing: 0.16em;
    }
    .cutscene-title {
      margin: 0 0 18px;
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0.08em;
      font-weight: 900;
    }
    .cutscene-text {
      margin: 0;
      white-space: pre-line;
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: clamp(1.08rem, 2.2vw, 1.45rem);
      line-height: 1.9;
      letter-spacing: 0.08em;
    }
    .cutscene-hint {
      margin-top: 18px;
      color: rgba(255,255,255,0.66);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      animation: hintPulse 2.4s ease-in-out infinite;
    }
    @keyframes inkPan {
      0% { transform: scale(1.02) translate3d(0, 0, 0); filter: grayscale(1) contrast(1.02) brightness(0.92); }
      100% { transform: scale(1.085) translate3d(-0.8%, -0.6%, 0); filter: grayscale(1) contrast(1.12) brightness(1); }
    }
    @keyframes inkMist {
      0% { transform: translate3d(-2%, 0, 0) scale(1); }
      50% { transform: translate3d(2%, -1%, 0) scale(1.04); }
      100% { transform: translate3d(-2%, 0, 0) scale(1); }
    }
    @keyframes textRise {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.52; }
      50% { opacity: 0.92; }
    }
    .dialog {
      width: min(960px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background:
        radial-gradient(circle at 20% 0%, rgba(46, 211, 230, 0.18), transparent 18rem),
        #111a2f;
      box-shadow: 0 30px 90px rgba(0,0,0,0.48);
      padding: 20px;
    }
    .dialog h2 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: 0;
    }
    .dialog p {
      margin: 0 0 14px;
      color: rgba(255, 248, 230, 0.8);
      font-weight: 850;
      line-height: 1.6;
    }
    .slots {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .slot {
      min-height: 132px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 10px;
      border: 2px dashed rgba(255,255,255,0.28);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      text-align: center;
      font-weight: 950;
    }
    .slot.correct {
      border-color: rgba(83, 255, 183, 0.9);
      background: rgba(34, 160, 107, 0.26);
    }
    .slot.wrong { animation: wrongFlash 0.35s ease; }
    .backpack {
      min-height: 124px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: rgba(0,0,0,0.18);
    }
    .badge {
      min-width: 138px;
      min-height: 54px;
      display: inline-grid;
      place-items: center;
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      color: #082317;
      background: linear-gradient(135deg, #fff1a8, #86f0c0);
      box-shadow: 0 10px 24px rgba(0,0,0,0.2), 0 0 22px rgba(244, 182, 66, 0.22);
      font-weight: 950;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .badge:active { cursor: grabbing; }
    .badge.placed { cursor: default; }
    .drag-ghost {
      position: fixed;
      z-index: 70;
      pointer-events: none;
      opacity: 0.92;
      transform: translate(-50%, -50%) scale(1.04);
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: end;
      margin-top: 16px;
    }
    .modal-btn.primary {
      color: #082317;
      background: linear-gradient(135deg, #ffe082, #55e4b0);
    }
    .modal-btn.secondary {
      color: #fff;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .complete {
      display: none;
      text-align: center;
      padding: 26px 8px 8px;
    }
    .complete.show { display: block; }
    .gate-game.hide { display: none; }
    .empty {
      color: rgba(255, 248, 230, 0.72);
      font-weight: 900;
    }
    @keyframes wrongFlash {
      0%, 100% { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.06); }
      50% { border-color: #ff6b6b; background: rgba(223, 77, 82, 0.3); transform: translateX(4px); }
    }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { min-height: 100svh; padding-top: 70px; }
      .map-container {
        width: min(100%, calc((100svh - 90px) * 1672 / 941));
        max-height: calc(100svh - 90px);
      }
      .info-panel {
        left: 10px;
        right: 10px;
        justify-content: space-between;
      }
      .slots { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="cover" id="cover" aria-label="遊戲開場封面">
    <img src="cover.png" alt="大冒險地圖開場封面">
    <div class="cover-hint">點一下開始冒險</div>
  </div>

  <main class="app">
    <div class="info-panel">
      <span class="held" id="heldCount">持有 0 / 4</span>
      <button class="clear-btn" id="clearBtn" type="button">🔄 清除進度</button>
    </div>

    <section class="map-container" aria-label="大冒險地圖">
      <img class="map-img" src="map-bg.png" alt="大冒險地圖">
      <button class="hotspot level-1" data-action="level" data-index="0" aria-label="唐朝時空冒險——唐詩精靈大師" type="button"></button>
      <button class="hotspot level-2" data-action="level" data-index="1" aria-label="大唐文字魔術師——唐詩填空大冒險" type="button"></button>
      <button class="hotspot level-3" data-action="level" data-index="2" aria-label="大唐心靈讀心師——唐詩情感解密大冒險" type="button"></button>
      <button class="hotspot level-4" data-action="level" data-index="3" aria-label="大唐未來編碼局——唐詩超能力綜合應用戰" type="button"></button>
      <button class="hotspot gate" data-action="gate" aria-label="中央大門" type="button"></button>
      <span class="stamp level-1" data-stamp="0">✓</span>
      <span class="stamp level-2" data-stamp="1">✓</span>
      <span class="stamp level-3" data-stamp="2">✓</span>
      <span class="stamp level-4" data-stamp="3">✓</span>
    </section>
  </main>

  <div class="modal" id="gateModal" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
    <div class="dialog">
      <div class="gate-game" id="gateGame">
        <h2 id="gateTitle">🔒 通關大門</h2>
        <p>把背包裡的憑證拖到對應凹槽。持有不足 4 個也可以先試，4 個都放對才會開門。</p>
        <div class="slots" id="slots"></div>
        <h3>背包欄</h3>
        <div class="backpack" id="backpack"></div>
        <div class="modal-actions">
          <button class="modal-btn secondary" id="resetSlotsBtn" type="button">重置凹槽</button>
          <button class="modal-btn secondary" id="closeModalBtn" type="button">關閉</button>
        </div>
      </div>
      <div class="complete" id="completeView">
        <h2>【冒險完成】</h2>
        <p id="timeText">總冒險時長：00 分 00 秒</p>
        <button class="modal-btn primary" id="againBtn" type="button">再次冒險</button>
      </div>
    </div>
  </div>

  <div class="cutscene" id="cutscene" aria-label="結局過場動畫">
    <img id="cutsceneImage" src="四印歸一.png" alt="">
    <video id="cutsceneVideo" muted playsinline loop preload="auto"></video>
    <audio id="cutsceneMusic" src="music.mp3" preload="auto" loop></audio>
    <div class="cutscene-copy">
      <p class="cutscene-kicker" id="cutsceneKicker">《四印之後》</p>
      <h2 class="cutscene-title" id="cutsceneTitle">四印歸一</h2>
      <p class="cutscene-text" id="cutsceneText"></p>
      <div class="cutscene-hint" id="cutsceneHint">點擊，往下一頁</div>
    </div>
  </div>

  <script>
    const certs = [
      {
        key: "cert_dynasty",
        type: "spirit",
        short: "唐詩精靈",
        badge: "唐詩精靈之印",
        emoji: "🎴",
        href: "示範1_唐朝時空冒險——唐詩精靈大師/index.html"
      },
      {
        key: "cert_idiom",
        type: "fill",
        short: "唐詩填空",
        badge: "唐詩填空之印",
        emoji: "📝",
        href: "示範2_大唐文字魔術師——唐詩填空大冒險/index.html"
      },
      {
        key: "cert_warrior",
        type: "emotion",
        short: "唐詩情感解密",
        badge: "唐詩情感解密之印",
        emoji: "⚔️",
        href: "示範3_大唐心靈讀心師——唐詩情感解密大冒險/index.html"
      },
      {
        key: "cert_poetry",
        altKey: "cert_power",
        type: "power",
        short: "唐詩超能力",
        badge: "唐詩超能力之印",
        emoji: "⚔️",
        href: "示範4_大唐未來編碼局——唐詩超能力綜合應用戰/index.html"
      }
    ];

    const els = {
      cover: document.getElementById("cover"),
      cutscene: document.getElementById("cutscene"),
      cutsceneImage: document.getElementById("cutsceneImage"),
      cutsceneVideo: document.getElementById("cutsceneVideo"),
      cutsceneMusic: document.getElementById("cutsceneMusic"),
      cutsceneTitle: document.getElementById("cutsceneTitle"),
      cutsceneText: document.getElementById("cutsceneText"),
      cutsceneHint: document.getElementById("cutsceneHint"),
      heldCount: document.getElementById("heldCount"),
      clearBtn: document.getElementById("clearBtn"),
      gateModal: document.getElementById("gateModal"),
      slots: document.getElementById("slots"),
      backpack: document.getElementById("backpack"),
      gateGame: document.getElementById("gateGame"),
      completeView: document.getElementById("completeView"),
      timeText: document.getElementById("timeText"),
      resetSlotsBtn: document.getElementById("resetSlotsBtn"),
      closeModalBtn: document.getElementById("closeModalBtn"),
      againBtn: document.getElementById("againBtn")
    };

    const placed = new Map();
    let activeDrag = null;
    let pendingCutscene = null;
    let audioCtx = null;
    let audioGain = null;
    let musicNodes = null;
    let chimeTimer = 0;
    let musicFadeTimer = 0;
    let narratorVoice = null;

    const cutscenes = [
      {
        video: "四印歸一.mp4",
        title: "四印歸一",
        text: "尋遍千山萬水，\n終於來到答案之前。\n而答案，從來不在門後。"
      },
      {
        video: "萬詩之境.mp4",
        title: "萬詩之境",
        text: "那些曾被誦讀的文字，\n從未沉睡。\n它們只是等待，\n下一位同行的人。"
      },
      {
        video: "詩魂長河.mp4",
        title: "詩魂長河",
        text: "人會遠去，\n山河也會改變。\n唯有留下的心意，\n仍在歲月之中迴響。"
      },
      {
        video: "新的旅人.mp4",
        title: "新的旅人",
        text: "故事沒有結束。\n只是有人抵達，\n有人出發。"
      },
      {
        video: "群山之外.mp4",
        title: "群山之外",
        text: "山外仍有山，\n詩外仍有詩。\n\n而你的故事，\n將在下一頁繼續。"
      }
    ];

    function initStartTime() {
      if (!localStorage.getItem("adventure_start")) {
        localStorage.setItem("adventure_start", String(Date.now()));
      }
    }

    function initCover() {
      if (sessionStorage.getItem("adventure_cover_seen") === "true") {
        els.cover.classList.add("hide");
      }
      els.cover.addEventListener("click", () => {
        sessionStorage.setItem("adventure_cover_seen", "true");
        els.cover.classList.add("hide");
      });
    }

    function hasCert(cert) {
      return localStorage.getItem(cert.key) === "true" || (cert.altKey && localStorage.getItem(cert.altKey) === "true");
    }

    function heldCerts() {
      return certs.filter(hasCert);
    }

    function renderProgress() {
      els.heldCount.textContent = `持有 ${heldCerts().length} / 4`;
      document.querySelectorAll("[data-stamp]").forEach(stamp => {
        stamp.classList.toggle("show", hasCert(certs[Number(stamp.dataset.stamp)]));
      });
    }

    function openGate() {
      renderGate();
      els.gateModal.classList.add("show");
    }

    function startEndingMusic() {
      const music = els.cutsceneMusic;
      if (!music) return;
      window.clearInterval(musicFadeTimer);
      music.volume = 0;
      music.currentTime = 0;
      music.play().catch(() => {});
      musicFadeTimer = window.setInterval(() => {
        music.volume = Math.min(0.72, music.volume + 0.045);
        if (music.volume >= 0.72) window.clearInterval(musicFadeTimer);
      }, 120);
    }

    function createInkMusic() {
      const droneFilter = audioCtx.createBiquadFilter();
      droneFilter.type = "lowpass";
      droneFilter.frequency.value = 580;
      droneFilter.Q.value = 0.45;
      droneFilter.connect(audioGain);

      const low = audioCtx.createOscillator();
      const fifth = audioCtx.createOscillator();
      const air = audioCtx.createOscillator();
      const lowGain = audioCtx.createGain();
      const fifthGain = audioCtx.createGain();
      const airGain = audioCtx.createGain();

      low.type = "sine";
      low.frequency.value = 73.42;
      fifth.type = "triangle";
      fifth.frequency.value = 110;
      air.type = "sine";
      air.frequency.value = 220;
      lowGain.gain.value = 0.32;
      fifthGain.gain.value = 0.08;
      airGain.gain.value = 0.018;

      low.connect(lowGain);
      fifth.connect(fifthGain);
      air.connect(airGain);
      lowGain.connect(droneFilter);
      fifthGain.connect(droneFilter);
      airGain.connect(audioGain);
      low.start();
      fifth.start();
      air.start();

      return { low, fifth, air, lowGain, fifthGain, airGain, droneFilter };
    }

    function scheduleChimes() {
      if (!audioCtx || chimeTimer) return;
      const scale = [196, 220, 261.63, 293.66, 329.63];
      chimeTimer = window.setInterval(() => {
        if (!audioCtx || !audioGain || audioGain.gain.value < 0.005) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        osc.type = "sine";
        osc.frequency.value = scale[Math.floor(Math.random() * scale.length)];
        filter.type = "lowpass";
        filter.frequency.value = 1200;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.035, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.4);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioGain);
        osc.start(now);
        osc.stop(now + 2.5);
      }, 4200);
    }

    function fadeEndingMusic() {
      const music = els.cutsceneMusic;
      if (!music) return;
      window.clearInterval(musicFadeTimer);
      musicFadeTimer = window.setInterval(() => {
        music.volume = Math.max(0, music.volume - 0.035);
        if (music.volume <= 0.001) {
          window.clearInterval(musicFadeTimer);
          music.pause();
          music.currentTime = 0;
        }
      }, 90);
    }

    function pickNarratorVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const zhVoices = voices.filter(voice => /zh|Chinese|Taiwan|Mandarin/i.test(`${voice.lang} ${voice.name}`));
      const maleVoice = zhVoices.find(voice => /male|男|yunxi|yunjian|kangkang|Sinji|Eddy/i.test(voice.name));
      narratorVoice = maleVoice || zhVoices[0] || voices[0] || null;
      return narratorVoice;
    }

    function speakCutscene(scene) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const text = `四印之後。${scene.title}。${scene.text}`;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-TW";
      utterance.rate = 0.72;
      utterance.pitch = 0.58;
      utterance.volume = 0.95;
      utterance.voice = narratorVoice || pickNarratorVoice();
      window.speechSynthesis.speak(utterance);
    }

    function stopNarration() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function showCutscene(index, nextAction) {
      const scene = cutscenes[index];
      pendingCutscene = nextAction;
      startEndingMusic();
      els.cutscene.classList.toggle("use-video", Boolean(scene.video));
      if (scene.video) {
        els.cutsceneVideo.src = scene.video;
        els.cutsceneVideo.currentTime = 0;
        els.cutsceneVideo.style.animation = "none";
        void els.cutsceneVideo.offsetWidth;
        els.cutsceneVideo.style.animation = "";
        els.cutsceneVideo.play().catch(() => {});
      } else {
        els.cutsceneVideo.pause();
        els.cutsceneImage.src = scene.image;
        els.cutsceneImage.alt = scene.title;
        els.cutsceneImage.style.animation = "none";
        void els.cutsceneImage.offsetWidth;
        els.cutsceneImage.style.animation = "";
      }
      els.cutsceneTitle.textContent = scene.title;
      els.cutsceneText.textContent = scene.text;
      els.cutsceneHint.textContent = index === 4 ? "點擊，開啟中央大門" : "點擊，進入下一幕";
      els.cutscene.classList.remove("fade");
      els.cutscene.classList.add("show");
      speakCutscene(scene);
    }

    function finishCutscene() {
      if (!pendingCutscene) return;
      stopNarration();
      fadeEndingMusic();
      const action = pendingCutscene;
      pendingCutscene = null;
      els.cutscene.classList.add("fade");
      setTimeout(() => {
        els.cutscene.classList.remove("show", "fade");
        els.cutsceneVideo.pause();
        if (action.type === "gate") {
          openGate();
        } else {
          sessionStorage.setItem("adventure_cover_seen", "true");
          window.location.href = action.href;
        }
      }, 720);
    }

    function renderGate() {
      placed.clear();
      els.gateGame.classList.remove("hide");
      els.completeView.classList.remove("show");
      els.slots.innerHTML = certs.map(cert => `
        <div class="slot" data-type="${cert.type}">
          <span>${cert.short}</span>
        </div>
      `).join("");
      const held = heldCerts();
      els.backpack.innerHTML = held.length
        ? held.map(cert => badgeHtml(cert)).join("")
        : `<span class="empty">背包還沒有憑證。先完成關卡，再回來開門！</span>`;
      bindDrag();
    }

    function badgeHtml(cert) {
      return `<div class="badge" draggable="true" data-type="${cert.type}">${cert.emoji} ${cert.badge}</div>`;
    }

    function bindDrag() {
      document.querySelectorAll(".badge").forEach(badge => {
        badge.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", badge.dataset.type);
        });
        badge.addEventListener("pointerdown", startPointerDrag);
      });
      document.querySelectorAll(".slot").forEach(slot => {
        slot.addEventListener("dragover", event => event.preventDefault());
        slot.addEventListener("drop", event => {
          event.preventDefault();
          const type = event.dataTransfer.getData("text/plain");
          const badge = document.querySelector(`.badge[data-type="${type}"]:not(.placed)`);
          tryPlace(type, slot, badge);
        });
      });
    }

    function startPointerDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      const badge = event.currentTarget;
      if (badge.classList.contains("placed")) return;
      const ghost = badge.cloneNode(true);
      ghost.classList.add("drag-ghost");
      document.body.appendChild(ghost);
      activeDrag = { badge, ghost, type: badge.dataset.type };
      moveGhost(event.clientX, event.clientY);
      badge.style.opacity = "0.35";
      window.addEventListener("pointermove", movePointerDrag);
      window.addEventListener("pointerup", endPointerDrag, { once: true });
    }

    function movePointerDrag(event) {
      if (!activeDrag) return;
      moveGhost(event.clientX, event.clientY);
    }

    function moveGhost(x, y) {
      activeDrag.ghost.style.left = `${x}px`;
      activeDrag.ghost.style.top = `${y}px`;
    }

    function endPointerDrag(event) {
      if (!activeDrag) return;
      const { badge, ghost, type } = activeDrag;
      ghost.remove();
      badge.style.opacity = "";
      const target = document.elementFromPoint(event.clientX, event.clientY);
      const slot = target && target.closest ? target.closest(".slot") : null;
      if (slot) tryPlace(type, slot, badge);
      activeDrag = null;
      window.removeEventListener("pointermove", movePointerDrag);
    }

    function tryPlace(type, slot, badge) {
      if (!badge || badge.classList.contains("placed")) return;
      if (slot.dataset.type !== type) {
        slot.classList.remove("wrong");
        void slot.offsetWidth;
        slot.classList.add("wrong");
        return;
      }
      slot.classList.add("correct");
      slot.innerHTML = "";
      badge.classList.add("placed");
      badge.setAttribute("draggable", "false");
      slot.appendChild(badge);
      placed.set(type, true);
      if (placed.size === certs.length) showComplete();
    }

    function showComplete() {
      fadeEndingMusic();
      stopNarration();
      els.gateGame.classList.add("hide");
      els.completeView.classList.add("show");
      const elapsed = Math.max(0, Date.now() - Number(localStorage.getItem("adventure_start") || Date.now()));
      const totalSeconds = Math.floor(elapsed / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      els.timeText.textContent = `【冒險完成】\n總冒險時長：${minutes} 分 ${seconds} 秒\n即將前往任務完成轉蛋機。`;
      setTimeout(() => {
        window.location.href = "任務完成轉蛋機/index.html";
      }, 1400);
    }

    function clearProgress(clearSession) {
      localStorage.clear();
      if (clearSession) sessionStorage.clear();
      initStartTime();
      renderProgress();
      renderGate();
    }

    document.querySelectorAll(".hotspot").forEach(hotspot => {
      hotspot.addEventListener("click", () => {
        if (hotspot.dataset.action === "gate") {
          showCutscene(4, { type: "gate" });
          return;
        }
        const cert = certs[Number(hotspot.dataset.index)];
        showCutscene(Number(hotspot.dataset.index), { type: "level", href: cert.href });
      });
    });

    els.cutscene.addEventListener("click", finishCutscene);

    els.clearBtn.addEventListener("click", () => clearProgress(false));
    els.closeModalBtn.addEventListener("click", () => els.gateModal.classList.remove("show"));
    els.resetSlotsBtn.addEventListener("click", renderGate);
    els.againBtn.addEventListener("click", () => {
      clearProgress(true);
      window.location.reload();
    });
    els.gateModal.addEventListener("click", event => {
      if (event.target === els.gateModal) els.gateModal.classList.remove("show");
    });

    initStartTime();
    initCover();
    if ("speechSynthesis" in window) {
      pickNarratorVoice();
      window.speechSynthesis.addEventListener("voiceschanged", pickNarratorVoice);
    }
    renderProgress();
  </script>
</body>
</html>
